{{ define "main" }}
<div style="max-width: 1000px; margin: 0 auto; padding: 50px 20px;">
  
  <section style="text-align: center; margin-bottom: 80px;">
    <h1>Bonjour, je suis Mathe 👋</h1>
    <p style="font-size: 1.5rem;">Expert Hugo & Développeur Full-Stack</p>
    <a href="#projets" class="btn-primary">Voir mes projets</a>
  </section>

  <h2 id="projets">Mes Dernières Créations</h2>
  <div class="projects-grid">
    {{ range (where .Site.RegularPages "Section" "posts") }}
    <div class="project-card">
      <h3>{{ .Title }}</h3>
      <p>{{ .Summary | truncate 100 }}</p>
      <a href="{{ .Permalink }}" style="color: var(--primary-color); font-weight: bold;">Lire la suite →</a>
    </div>
    {{ end }}
  </div>

  <div style="text-align: center; margin-top: 100px;">
    <img src="https://cdn.unitycms.io/images/1yxh34BSazwAzCQUBGdJze.jpg" 
         alt="Illustration de ville futuriste numérique Mathe Portfolio" 
         style="max-width: 100%; height: auto; border-radius: 20px; box-shadow: var(--shadow);">
  </div>
  </div>
{{ end }}
